name: SUNLIGHT CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14-dev"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check --config ruff.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      SUNLIGHT_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14-dev"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest httpx fastapi uvicorn python-multipart

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  validate:
    name: DOJ Validation
    runs-on: ubuntu-latest
    needs: test
    env:
      SUNLIGHT_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14-dev"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest httpx fastapi uvicorn python-multipart

      - name: Run DOJ validation suite
        working-directory: code
        run: python doj_validation.py --ci

      - name: Check accuracy gate
        run: |
          python -c "
          import json, sys
          with open('reports/validation_report.json') as f:
              r = json.load(f)
          recall = r['classification_metrics']['recall']
          f1 = r['classification_metrics']['f1_score']
          print(f'Recall: {recall:.1%}')
          print(f'F1:     {f1:.1%}')
          if recall < 0.90:
              print(f'FAIL: Recall {recall:.1%} is below 90% threshold')
              sys.exit(1)
          print('PASS: Accuracy gate passed')
          "

  evaluation:
    name: Evaluation Gate
    runs-on: ubuntu-latest
    needs: test
    env:
      SUNLIGHT_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14-dev"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest httpx fastapi uvicorn python-multipart

      - name: Run evaluation framework
        working-directory: code
        run: python evaluation.py --ci --bootstrap 500 --clean 100

      - name: Check evaluation gates
        run: |
          python -c "
          import json, sys
          with open('docs/evaluation_report.json') as f:
              r = json.load(f)
          gate = r['ci_gate']
          m = r['classification_metrics']
          wl = r['review_workload']
          print('SUNLIGHT Evaluation Gate')
          print('========================')
          print(f'Precision:  {m[\"precision\"]:.1%} (min: {gate[\"precision_check\"][\"threshold\"]:.0%})')
          print(f'Recall:     {m[\"recall\"]:.1%} (min: {gate[\"recall_check\"][\"threshold\"]:.0%})')
          print(f'Flags/1K:   {wl[\"flags_per_1000_contracts\"]:.1f} (max: {gate[\"flags_per_1k_check\"][\"threshold\"]})')
          for name in ['precision_check', 'recall_check', 'flags_per_1k_check']:
              g = gate[name]
              status = 'PASS' if g['pass'] else 'FAIL'
              print(f'  {name}: {status}')
          if not gate['all_pass']:
              print('FAIL: One or more evaluation gates did not pass')
              sys.exit(1)
          print('PASS: All evaluation gates passed')
          "
