# SUNLIGHT Ruff Configuration

# Only lint core code, not legacy scrapers
include = [
    "code/api.py",
    "code/auth.py",
    "code/dashboard.py",
    "code/detection_report.py",
    "code/doj_validation.py",
    "code/institutional_pipeline.py",
    "code/institutional_statistical_rigor.py",
    "code/ingestion.py",
    "code/sunlight_logging.py",
    "code/vendor_intelligence.py",
    "code/network_analysis.py",
    "code/case_builder.py",
    "code/priority_queue.py",
    "code/external_data.py",
    "code/process_indicators.py",
    "code/ocds_adapter.py",
    "code/api_v2_routes.py",
    "code/live_monitor.py",
    "tests/**/*.py",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
]
ignore = [
    "E501",  # line too long
    "E402",  # module level import not at top
    "E711",  # comparison to None
    "E712",  # comparison to True/False
    "E741",  # ambiguous variable name
    "F401",  # unused imports
    "E731",  # lambda assignment
    "W291",  # trailing whitespace
    "W293",  # whitespace before ':'
    "E701",  # multiple statements on one line
    "E722",  # bare except
    "E702",  # multiple statements on one line (semicolons)
]
