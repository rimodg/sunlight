services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sunlight}
      POSTGRES_USER: ${POSTGRES_USER:-sunlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sunlight}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sunlight}
      POSTGRES_USER: ${POSTGRES_USER:-sunlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SUNLIGHT_DB_PATH: /app/data/sunlight.db
    command: >
      python /app/migrations/002_data_migration.py
        --sqlite /app/data/sunlight.db
        --pg "postgresql://${POSTGRES_USER:-sunlight}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sunlight}"
    restart: "no"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SUNLIGHT_PORT:-8000}:8000"
    environment:
      SUNLIGHT_DB_PATH: /app/data/sunlight.db
      SUNLIGHT_AUTH_ENABLED: ${SUNLIGHT_AUTH_ENABLED:-true}
      SUNLIGHT_LOG_LEVEL: ${SUNLIGHT_LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sunlight}
      POSTGRES_USER: ${POSTGRES_USER:-sunlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    restart: unless-stopped

  webhook-worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUNLIGHT_DB_PATH: /app/data/sunlight.db
      SUNLIGHT_LOG_LEVEL: ${SUNLIGHT_LOG_LEVEL:-INFO}
      WEBHOOK_WORKER_CONCURRENCY: ${WEBHOOK_WORKER_CONCURRENCY:-4}
      WEBHOOK_RETRY_MAX: ${WEBHOOK_RETRY_MAX:-3}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sunlight}
      POSTGRES_USER: ${POSTGRES_USER:-sunlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    command: python -m jobs --worker
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    depends_on:
      - prometheus
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
