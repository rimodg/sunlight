# SUNLIGHT API - Minimal Production Deployment
# Single-service deployment for the REST API
# For full stack with postgres/prometheus/grafana, see docker-compose.full.yml

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sunlight-api
    ports:
      - "${SUNLIGHT_PORT:-8000}:8000"
    environment:
      # Logging configuration
      SUNLIGHT_LOG_LEVEL: ${SUNLIGHT_LOG_LEVEL:-INFO}

      # Calibration store path (persisted via volume)
      SUNLIGHT_CALIBRATION_DIR: /app/calibration

      # Optional: Auth configuration (future)
      SUNLIGHT_AUTH_ENABLED: ${SUNLIGHT_AUTH_ENABLED:-false}

    volumes:
      # Persist empirical calibration state across container restarts
      - calibration_data:/app/calibration:rw

      # Optional: Mount local data directory for development
      # - ./data:/app/data:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=2.0)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    # Security: Run with minimal capabilities
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Security: Read-only root filesystem (calibration dir is mounted rw)
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777

volumes:
  calibration_data:
    driver: local
